version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: odoo
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      PORT: 5432
      USER: odoo
      PASSWORD: odoo
      ADDONS_PATH: /mnt/extra-addons
    volumes:
      - .:/mnt/extra-addons/to_do_odoo_task
      - odoo_data:/var/lib/odoo
    ports:
      - "8069:8069"
      - "8072:8072"
    command: odoo --db_host=db --db_port=5432 --db_user=odoo --db_password=odoo --addons-path=/mnt/extra-addons

volumes:
  postgres_data:
  odoo_data:
