; Odoo Configuration File for To-Do Module
[options]

; Database settings
db_host = localhost
db_port = 5432
db_user = odoo
db_password = odoo
db_template = template1

; Addon paths
addons_path = .

; Server settings
http_port = 8069
xmlrpc_port = 8072
workers = 2

; Logging
log_level = info
logfile = logs/odoo.log

; Session settings
session_timeout = 7200

; Demo data
demo = {}

; Auto reload
auto_reload = True

; Development mode
dev_mode = True
